backend:
  name: github
  repo: revanthrsai/ISO-Academy-20022 # Your GitHub repository
  branch: main # Branch to update

media_folder: "assets/images/uploads" # Folder where uploaded images are saved
public_folder: "assets/images/uploads"

collections:
  - name: "articles"
    label: "Library Articles"
    folder: "content" # The folder where the .md files are saved
    create: true
    slug: "{{id}}" # The filename will be the ID (e.g., 101-nostro-vostro.md)
    fields:
      - { label: "Article ID", name: "id", widget: "string", hint: "e.g., 101-nostro-vostro" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Level (e.g., 101, 201)", name: "level", widget: "number" }
      - { label: "Category", name: "category", widget: "select", options: ["Fundamentals", "Messaging", "Exceptions"] }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Minutes to Read", name: "minutes", widget: "number", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }